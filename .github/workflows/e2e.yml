name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# E2E runs against a throwaway local Supabase stack (Docker on the runner), seeded
# from schema.sql + migrations — the same `npm run e2e:db` + `npm run test:e2e` flow
# used locally. Kept as its own workflow (slower than the unit gate); promote to a
# required check on `main` once it's proven stable.
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: Boot local Supabase + apply schema
        run: npm run e2e:db

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: npx --yes supabase stop --no-backup || true
